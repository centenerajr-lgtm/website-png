<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 STEM TEAL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia, 'Times New Roman', Times, serif;
}



header{
position: fixed;
top:0;
width:100%;
background:#2b997e;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
}
div{
display: flex;
flex-direction: row;    
}
.header-left{
display:flex;
gap:15px;
align-items:center;
}

.home-btn {
padding: 0;
border: Black;
height: 40px;
width: 40px;    
}
.home-btn img {
border-radius: 6px;
cursor:pointer; 
transition: 0.2s;       
height: 100%;
width: 100%;    
}
.home-btn:hover {
transform: scale(2);        
}
button {
border-radius: 6px;
cursor:pointer;
transition: 0.3s;
padding: 0;
border: black;
height: 40px;
width: 40px;    
}
button:hover {
transform: scale(2);
background: whitesmoke;        
}
.hero{
display:flex;
justify-content:center;
padding:40px;
}

.hero-box{
width:80%;
height:450px;
display:flex;
flex-direction: column;
align-items:center;
justify-content:center;
}

.hero-box img {
height: 70%;
width: 45%;
border: 4px solid white;
border-radius: 15px;
box-shadow: 0 6px 20px rgba(0,0,0,0.2);
padding: 5px;
background: white;
transition: 0.3s;
}

.hero-box img:hover {
transform: scale(1.05);
}
.image-desc {
background: white;
margin-top: 40px;        
}
.description{
text-align:center;
padding:20px;
background:#3196d1;
color:azure;
}



.categories{
height: 100vh;
display:flex;
justify-content:center;
gap:30px;
padding:40px;
background:#f0f0f0;
}

.category{
cursor:pointer;
transition: 0.3s;        
width:200px;
height:100px;
background:white;
border:2px solid #ccc;
border-radius: 20px;
display:flex;
align-items:center;
justify-content:center;
}
.category:hover {
transform:scale(1.3);         
}



footer{
background:#2b997e;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<header>
<div class="header-left">
<button>☰</button>
<button class="home-btn"> <img src=" https://raw.githubusercontent.com/centenerajr-lgtm/12-teal-photos/1fd844d55fdf03ed2abc8a15328edc4b0e32b2aa/pink-grey-gradient-home-button-icon-home-button-icon-transparent-11553494391n140cdoukd.png"
alt="button">

</button>
</div>

<h2>WELCOME TO 12-STEM TEAL</h2>

<div> <a href="">Lightmode</a>
</div>
</header>


<section class="hero">
<div class="hero-box">
<img src="https://raw.githubusercontent.com/centenerajr-lgtm/12-teal-photos/0cbcbf51d8d769315db5d928921ea4fe11878738/481714088_626366150194488_5962722867243626304_n.jpg" alt="photo"
        width="400"
        height="150"
        >
        <p class="image-desc"></p>
 <p>This is a website dediicated to our classmates and teachers, especially for our adviser Samboy Sampaga. </p>       
</div>
</section>


<section class="description">
<h1>Choose an information base on the category list.</h1>
</section>


<section class="categories">
<div class="category">Category 1</div>
<div class="category">Category 2</div>
<div class="category">Category 3</div>
</section>


<footer>
Group No. Website • Link: GitHub
</footer>

</body>
</html>
